<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent SOC</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #eef3f8;
            margin: 40px;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.15);
        }

        h1 {
            text-align: center;
            color: #0f4c81;
        }

        h3 {
            color: #444;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            font-size: 18px;
            color: white;
            background: #0f4c81;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #08345d;
        }

        .result {
            margin-top: 30px;
        }

        pre {
            background: #222;
            color: white;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-x: auto;
            font-size: 15px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🛡️ Multi-Agent Security Operations Center</h1>

    <h3>Enter Security Log</h3>

    <form method="POST">

        <textarea
            name="security_log"
            placeholder="Paste your security log here..."
            required></textarea>

        <button type="submit">
            Analyze Security Log
        </button>

    </form>

    {% if result %}

    <div class="result">

        <h2>Analysis Result</h2>

        <pre>{{ result }}</pre>

    </div>

    {% endif %}

</div>

</body>

</html>
